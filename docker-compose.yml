services:
  postgres:
    image: postgres:16-alpine
    container_name: whiteops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whiteops
      POSTGRES_USER: whiteops
      POSTGRES_PASSWORD: whiteops
    ports:
      - "5432:5432"
    volumes:
      - whiteops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whiteops -d whiteops"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  whiteops_postgres_data:
